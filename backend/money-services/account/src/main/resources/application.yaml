spring:
  application:
    name: account

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

  datasource:
    url: jdbc:postgresql://localhost:5432/patterns_core_account
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

server:
  port: 8082

master-bank:
  account-number: 0000-0000-0000-0000
  money: 1000000000
  user-id: 00000000-0000-0000-0000-000000000000

kafka:
  url: ${KAFKA_URL:localhost:29092}
  group: "account-service"

  consumer:
    ban-users: 00_ban_user_bank_accounts
    take-credit: 00_take_credit
    transfer-assignment: 00_transfer_assignment

  provider:
    transfer-request: 00_transfer_request
